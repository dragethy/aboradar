<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFB0"/>
      <stop offset="100%" stop-color="#00C98A"/>
    </linearGradient>
    <linearGradient id="g4dim" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00E89D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00E89D" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- App icon rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="#0A0B10"/>
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="#1A1D27" stroke-width="2"/>

  <!-- Hexagonal radar grid (subtle) -->
  <polygon points="256,96 395,176 395,336 256,416 117,336 117,176" fill="none" stroke="#00E89D" stroke-width="1" stroke-opacity="0.08"/>
  <polygon points="256,146 365,196 365,316 256,366 147,316 147,196" fill="none" stroke="#00E89D" stroke-width="1" stroke-opacity="0.14"/>
  <polygon points="256,196 330,221 330,291 256,316 182,291 182,221" fill="none" stroke="#00E89D" stroke-width="1.5" stroke-opacity="0.22"/>

  <!-- Radar sweep triangle -->
  <path d="M256 256 L256 96 L395 176 Z" fill="url(#g4dim)"/>

  <!-- Scan line -->
  <line x1="256" y1="256" x2="395" y2="176" stroke="url(#g4)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center hexagon -->
  <polygon points="256,236 274,246 274,266 256,276 238,266 238,246" fill="url(#g4)"/>

  <!-- Detected nodes -->
  <circle cx="320" cy="190" r="8" fill="#00E89D"/>
  <circle cx="320" cy="190" r="15" fill="none" stroke="#00E89D" stroke-width="1.5" opacity="0.4"/>

  <circle cx="180" cy="200" r="6" fill="#00E89D" opacity="0.5"/>
  <circle cx="340" cy="280" r="6" fill="#4DA6FF" opacity="0.6"/>

  <!-- Warning node (unused sub) -->
  <circle cx="175" cy="310" r="6" fill="#FF5C5C" opacity="0.8"/>
  <circle cx="175" cy="310" r="13" fill="none" stroke="#FF5C5C" stroke-width="1.5" opacity="0.3"/>

  <!-- Connection lines from center to nodes -->
  <line x1="256" y1="256" x2="320" y2="190" stroke="#00E89D" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="256" y1="256" x2="175" y2="310" stroke="#FF5C5C" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>
  <line x1="256" y1="256" x2="340" y2="280" stroke="#4DA6FF" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>
</svg>
