<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00E89D"/>
      <stop offset="100%" stop-color="#00B87A"/>
    </linearGradient>
    <linearGradient id="g2bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#08090D"/>
    </linearGradient>
    <clipPath id="shield-clip">
      <path d="M256 42 L440 130 C440 310 370 430 256 480 C142 430 72 310 72 130 Z"/>
    </clipPath>
  </defs>

  <!-- Shield shape -->
  <path d="M256 42 L440 130 C440 310 370 430 256 480 C142 430 72 310 72 130 Z" fill="url(#g2bg)" stroke="url(#g2)" stroke-width="3"/>

  <!-- Radar rings inside shield -->
  <g clip-path="url(#shield-clip)">
    <circle cx="256" cy="240" r="160" fill="none" stroke="#00E89D" stroke-width="1.5" stroke-opacity="0.12"/>
    <circle cx="256" cy="240" r="115" fill="none" stroke="#00E89D" stroke-width="1.5" stroke-opacity="0.2"/>
    <circle cx="256" cy="240" r="70" fill="none" stroke="#00E89D" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- Radar sweep -->
    <path d="M256 240 L256 80 A160 160 0 0 1 394.5 160 Z" fill="#00E89D" fill-opacity="0.1"/>

    <!-- Scan line -->
    <line x1="256" y1="240" x2="394.5" y2="160" stroke="#00E89D" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

    <!-- Crosshairs -->
    <line x1="96" y1="240" x2="416" y2="240" stroke="#00E89D" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="256" y1="80" x2="256" y2="400" stroke="#00E89D" stroke-width="0.5" stroke-opacity="0.15"/>
  </g>

  <!-- Center dot -->
  <circle cx="256" cy="240" r="6" fill="#00E89D"/>
  <circle cx="256" cy="240" r="12" fill="none" stroke="#00E89D" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Subscription blips -->
  <circle cx="310" cy="160" r="6" fill="#00E89D" opacity="0.8"/>
  <circle cx="200" cy="180" r="5" fill="#00E89D" opacity="0.5"/>
  <circle cx="190" cy="310" r="5" fill="#FF5C5C" opacity="0.7"/>
  <circle cx="190" cy="310" r="11" fill="none" stroke="#FF5C5C" stroke-width="1.5" opacity="0.3"/>
  <circle cx="330" cy="270" r="4" fill="#4DA6FF" opacity="0.6"/>
</svg>
