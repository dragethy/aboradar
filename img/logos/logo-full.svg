<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" fill="none">
  <defs>
    <linearGradient id="fa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFB0"/>
      <stop offset="100%" stop-color="#00C98A"/>
    </linearGradient>
    <linearGradient id="fsweep" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#00E89D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E89D" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="fglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E89D" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00E89D" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="fc">
      <circle cx="50" cy="50" r="44"/>
    </clipPath>
  </defs>

  <!-- === Mini Logo Icon === -->
  <circle cx="50" cy="50" r="46" fill="#0A0B10"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#1A1D27" stroke-width="1.5"/>

  <circle cx="50" cy="46" r="38" fill="url(#fglow)"/>

  <g clip-path="url(#fc)">
    <!-- Radar rings -->
    <circle cx="50" cy="48" r="36" fill="none" stroke="#00E89D" stroke-width="0.8" stroke-opacity="0.1"/>
    <circle cx="50" cy="48" r="26" fill="none" stroke="#00E89D" stroke-width="0.8" stroke-opacity="0.18"/>
    <circle cx="50" cy="48" r="16" fill="none" stroke="#00E89D" stroke-width="1" stroke-opacity="0.28"/>

    <!-- Sweep -->
    <path d="M50 48 L50 12 A36 36 0 0 1 81.1 28.6 Z" fill="url(#fsweep)"/>
    <line x1="50" y1="48" x2="81.1" y2="28.6" stroke="url(#fa)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Mini calendar (bolder) -->
    <g transform="translate(50, 48)">
      <rect x="-10" y="-7" width="20" height="17" rx="3" fill="#0A0B10" stroke="#00E89D" stroke-width="2" opacity="1"/>
      <rect x="-10" y="-7" width="20" height="6" rx="3" fill="#00E89D" opacity="0.2"/>
      <line x1="-10" y1="-1" x2="10" y2="-1" stroke="#00E89D" stroke-width="1.2" opacity="0.5"/>
      <line x1="-4" y1="-11" x2="-4" y2="-5" stroke="#00E89D" stroke-width="2.5" stroke-linecap="round" opacity="1"/>
      <line x1="4" y1="-11" x2="4" y2="-5" stroke="#00E89D" stroke-width="2.5" stroke-linecap="round" opacity="1"/>
      <text x="0" y="8" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="900" fill="#00E89D" opacity="0.9">&#8364;</text>
    </g>

    <!-- Blips -->
    <circle cx="68" cy="30" r="2.5" fill="#00E89D" opacity="0.8"/>
    <circle cx="35" cy="66" r="2" fill="#FF5C5C" opacity="0.7"/>

    <!-- Ripple -->
    <ellipse cx="50" cy="88" rx="28" ry="2.5" fill="none" stroke="#00E89D" stroke-width="0.8" stroke-opacity="0.2"/>
  </g>

  <!-- === Wordmark === -->
  <!-- "Abo" in white -->
  <text x="112" y="62" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#F0F2F5" letter-spacing="-0.5">Abo</text>
  <!-- "Radar" in accent green -->
  <text x="200" y="62" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#00E89D" letter-spacing="-0.5">Radar</text>
  <!-- ".app" in muted -->
  <text x="348" y="62" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#5A6178" letter-spacing="-0.5">.app</text>
</svg>
